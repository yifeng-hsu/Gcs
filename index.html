<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EMT-P GCS 聽力訓練器</title>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background: #2c3e50; color: white; display: flex; justify-content: center; padding: 20px; }
        .card { background: #34495e; width: 100%; max-width: 500px; border-radius: 20px; padding: 30px; box-shadow: 0 10px 30px rgba(0,0,0,0.5); text-align: center; }
        .header { margin-bottom: 20px; border-bottom: 1px solid #5d6d7e; padding-bottom: 10px; }
        
        /* 文字隱藏邏輯 */
        .scenario-box { background: #1a252f; border-radius: 10px; padding: 20px; min-height: 80px; margin-bottom: 20px; display: flex; align-items: center; justify-content: center; }
        #scenarioText { font-size: 1.2rem; display: none; line-height: 1.6; color: #ecf0f1; }
        
        .btn-action { background: #e67e22; color: white; border: none; padding: 10px 20px; border-radius: 5px; cursor: pointer; margin: 5px; font-weight: bold; }
        .btn-action:hover { background: #d35400; }
        
        .label { font-weight: bold; width: 100%; margin: 15px 0 10px 0; color: #bdc3c7; text-align: left; font-size: 0.9rem; }
        .btn-group { display: flex; justify-content: space-between; gap: 8px; margin-bottom: 10px; }
        
        /* 數字按鈕 */
        button.num-btn { flex: 1; height: 55px; border-radius: 8px; border: 1px solid #7f8c8d; background: #ecf0f1; color: #2c3e50; font-size: 1.3rem; font-weight: bold; cursor: pointer; transition: 0.2s; }
        button.correct { background: #27ae60 !important; color: white; border-color: #2ecc71; transform: scale(1.05); }
        button.wrong { background: #e74c3c !important; color: white; border-color: #c0392b; }
        
        .next-btn { background: #2980b9; color: white; width: 100%; height: 50px; border: none; border-radius: 8px; cursor: pointer; font-size: 1.1rem; margin-top: 20px; font-weight: bold; }
        .score { font-size: 0.8rem; color: #95a5a6; margin-top: 5px; }
    </style>
</head>
<body>

<div class="card">
    <div class="header">
        <div style="font-size: 1.5rem; font-weight: bold;">GCS 直覺聽力訓練</div>
        <div class="score">TP 訓練模式：第 17 期專用</div>
    </div>

    <div class="scenario-box">
        <div id="scenarioText">題目載入中...</div>
        <div id="placeholderText" style="color: #7f8c8d;">題目已隱藏，請聽語音</div>
    </div>

    <div>
        <button class="btn-action" onclick="speakScenario()">🔊 重聽語音</button>
        <button class="btn-action" id="toggleBtn" onclick="toggleText()" style="background: #7f8c8d;">👁️ 顯示文字</button>
    </div>

    <div class="controls">
        <div class="label">EYE (E)</div>
        <div class="btn-group" id="e-group">
            <button class="num-btn" onclick="check(this, 'e', 1)">1</button>
            <button class="num-btn" onclick="check(this, 'e', 2)">2</button>
            <button class="num-btn" onclick="check(this, 'e', 3)">3</button>
            <button class="num-btn" onclick="check(this, 'e', 4)">4</button>
        </div>

        <div class="label">VERBAL (V)</div>
        <div class="btn-group" id="v-group">
            <button class="num-btn" onclick="check(this, 'v', 1)">1</button>
            <button class="num-btn" onclick="check(this, 'v', 2)">2</button>
            <button class="num-btn" onclick="check(this, 'v', 3)">3</button>
            <button class="num-btn" onclick="check(this, 'v', 4)">4</button>
            <button class="num-btn" onclick="check(this, 'v', 5)">5</button>
        </div>

        <div class="label">MOTOR (M)</div>
        <div class="btn-group" id="m-group">
            <button class="num-btn" onclick="check(this, 'm', 1)">1</button>
            <button class="num-btn" onclick="check(this, 'm', 2)">2</button>
            <button class="num-btn" onclick="check(this, 'm', 3)">3</button>
            <button class="num-btn" onclick="check(this, 'm', 4)">4</button>
            <button class="num-btn" onclick="check(this, 'm', 5)">5</button>
            <button class="num-btn" onclick="check(this, 'm', 6)">6</button>
        </div>
    </div>
    
    <button class="next-btn" onclick="nextQuestion()">下一題 (Next Case)</button>
    <div class="score" style="margin-top: 15px;">已成功完成: <span id="count">0</span> 題</div>
</div>

<script>
    let currentAnswer = { e: 0, v: 0, m: 0 };
    let userAnswer = { e: 0, v: 0, m: 0 };
    let totalPracticed = 0;
    let textVisible = false;

    // 擴充更豐富的題庫邏輯
    const scenarios = [
        { text: "先生沒反應，痛刺激才張眼，大聲罵出單字髒話，手可以撥掉你的手。", e: 2, v: 3, m: 5 },
        { text: "患者對大聲呼喚有反應並張眼，問他名字他說他在火星，要求握手時可以配合。", e: 3, v: 4, m: 6 },
        { text: "患者維持睜眼狀態，但你問什麼他都不說話，痛刺激時手部呈異常屈曲。", e: 4, v: 1, m: 3 },
        { text: "患者完全沒反應。痛刺激不張眼，僅發出呻吟聲，兩手向外僵硬伸展。", e: 1, v: 2, m: 2 },
        { text: "患者自發睜眼，對答如流，但你要他握手時他完全不動，痛刺激也沒反應。", e: 4, v: 5, m: 1 },
        { text: "呼喚才張眼，講話聽不懂在說什麼，痛刺激時會迅速把手抽走躲避。", e: 3, v: 2, m: 4 },
        { text: "考官說：患者可以配合所有動作，對答如流，自發睜眼。", e: 4, v: 5, m: 6 },
        { text: "患者眼睛被繃帶包紮。呼喚沒反應，痛刺激有呻吟聲，手能定位痛點。請評估後續分數。", e: 1, v: 2, m: 5 },
        { text: "OHCA現場。患者完全無張眼、無聲音、無動作。", e: 1, v: 1, m: 1 }
    ];

    function toggleText() {
        textVisible = !textVisible;
        const textEl = document.getElementById('scenarioText');
        const placeholderEl = document.getElementById('placeholderText');
        const btn = document.getElementById('toggleBtn');
        
        if (textVisible) {
            textEl.style.display = 'block';
            placeholderEl.style.display = 'none';
            btn.innerText = '🙈 隱藏文字';
        } else {
            textEl.style.display = 'none';
            placeholderEl.style.display = 'block';
            btn.innerText = '👁️ 顯示文字';
        }
    }

    function nextQuestion() {
        userAnswer = { e: 0, v: 0, m: 0 };
        document.querySelectorAll('.num-btn').forEach(b => b.className = 'num-btn');
        
        // 隨機選題
        const rand = Math.floor(Math.random() * scenarios.length);
        const q = scenarios[rand];
        currentAnswer = { e: q.e, v: q.v, m: q.m };
        
        document.getElementById('scenarioText').innerText = q.text;
        
        // 重置文字顯示狀態為隱藏
        textVisible = true; toggleText(); 
        
        speakScenario();
    }

    function speakScenario() {
        window.speechSynthesis.cancel(); // 先停止之前的語音
        const text = document.getElementById('scenarioText').innerText;
        const msg = new SpeechSynthesisUtterance(text);
        msg.lang = 'zh-TW';
        msg.rate = 1.0;
        window.speechSynthesis.speak(msg);
    }

    function check(btn, type, val) {
        const group = document.getElementById(`${type}-group`);
        group.querySelectorAll('.num-btn').forEach(b => b.className = 'num-btn');
        
        if (val === currentAnswer[type]) {
            btn.classList.add('correct');
            userAnswer[type] = val;
        } else {
            btn.classList.add('wrong');
        }

        // 判斷全對
        if (userAnswer.e === currentAnswer.e && userAnswer.v === currentAnswer.v && userAnswer.m === currentAnswer.m) {
            totalPracticed++;
            document.getElementById('count').innerText = totalPracticed;
            // 答對時自動顯示文字給回饋
            if (!textVisible) toggleText();
            setTimeout(nextQuestion, 1500);
        }
    }

    window.onload = nextQuestion;
</script>

</body>
</html>
