<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EMT-P GCS 直覺訓練器</title>
    <style>
        body { font-family: sans-serif; background: #f0f2f5; display: flex; justify-content: center; padding: 20px; }
        .card { background: white; width: 100%; max-width: 500px; border-radius: 15px; padding: 25px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); text-align: center; }
        .scenario { font-size: 1.2rem; min-height: 80px; margin-bottom: 20px; color: #333; line-height: 1.6; }
        .btn-group { display: flex; justify-content: center; gap: 10px; margin-bottom: 20px; flex-wrap: wrap; }
        .label { font-weight: bold; width: 100%; margin-bottom: 10px; color: #555; }
        button { width: 50px; height: 50px; border-radius: 10px; border: 2px solid #ddd; background: white; font-size: 1.1rem; cursor: pointer; transition: 0.2s; }
        button.active { background: #007bff; color: white; border-color: #0056b3; }
        button.correct { background: #28a745 !important; color: white; }
        button.wrong { background: #dc3545 !important; color: white; }
        .controls { margin-top: 30px; border-top: 1px solid #eee; pt: 20px; }
        .next-btn { background: #333; color: white; width: 120px; height: 40px; border: none; cursor: pointer; }
        .score { font-size: 0.9rem; color: #888; }
    </style>
</head>
<body>

<div class="card">
    <h2>GCS 模擬訓練 (NTPC 17th)</h2>
    <div class="score">已練習: <span id="count">0</span></div>
    <hr>
    <div class="scenario" id="scenarioText">點擊下方按鈕開始練習...</div>
    <button onclick="speakScenario()" style="width: auto; height: auto; padding: 5px 15px; font-size: 0.8rem;">再聽一次 🔊</button>

    <div class="controls">
        <div class="label">Eye Opening (E)</div>
        <div class="btn-group" id="e-group">
            <button onclick="check(this, 'e', 1)">1</button>
            <button onclick="check(this, 'e', 2)">2</button>
            <button onclick="check(this, 'e', 3)">3</button>
            <button onclick="check(this, 'e', 4)">4</button>
        </div>

        <div class="label">Verbal Response (V)</div>
        <div class="btn-group" id="v-group">
            <button onclick="check(this, 'v', 1)">1</button>
            <button onclick="check(this, 'v', 2)">2</button>
            <button onclick="check(this, 'v', 3)">3</button>
            <button onclick="check(this, 'v', 4)">4</button>
            <button onclick="check(this, 'v', 5)">5</button>
        </div>

        <div class="label">Motor Response (M)</div>
        <div class="btn-group" id="m-group">
            <button onclick="check(this, 'm', 1)">1</button>
            <button onclick="check(this, 'm', 2)">2</button>
            <button onclick="check(this, 'm', 3)">3</button>
            <button onclick="check(this, 'm', 4)">4</button>
            <button onclick="check(this, 'm', 5)">5</button>
            <button onclick="check(this, 'm', 6)">6</button>
        </div>
    </div>
    
    <button class="next-btn" onclick="nextQuestion()">下一題</button>
</div>

<script>
    let currentAnswer = { e: 0, v: 0, m: 0 };
    let userAnswer = { e: 0, v: 0, m: 0 };
    let totalPracticed = 0;

    const scenarios = [
        { text: "患者可以配合所有動作，對答如流，自發睜眼。", e: 4, v: 5, m: 6 },
        { text: "呼喚才張眼，說話混亂不知所云，痛刺激時手可以撥開你的手。", e: 3, v: 4, m: 5 },
        { text: "痛刺激才張眼，只能發出呻吟聲，痛刺激時身體呈異常伸展。", e: 2, v: 2, m: 2 },
        { text: "完全不張眼，沒聲音，痛刺激時手會縮回躲避。", e: 1, v: 1, m: 4 },
        { text: "自發張眼，只能說出單個單字，要求握手時無法配合但痛刺激能定位位置。", e: 4, v: 3, m: 5 },
        { text: "呼喚才張眼，對話清楚，要求握手時完全沒反應。", e: 3, v: 5, m: 1 },
        { text: "痛刺激不張眼，發出聽不懂的怪聲，痛刺激時兩手異常屈曲。", e: 1, v: 2, m: 3 }
    ];

    function nextQuestion() {
        // 重置狀態
        userAnswer = { e: 0, v: 0, m: 0 };
        document.querySelectorAll('button').forEach(b => b.className = '');
        
        // 隨機選題
        const rand = Math.floor(Math.random() * scenarios.length);
        const q = scenarios[rand];
        currentAnswer = { e: q.e, v: q.v, m: q.m };
        
        document.getElementById('scenarioText').innerText = q.text;
        speakScenario();
    }

    function speakScenario() {
        const text = document.getElementById('scenarioText').innerText;
        const msg = new SpeechSynthesisUtterance(text);
        msg.lang = 'zh-TW';
        msg.rate = 0.9;
        window.speechSynthesis.speak(msg);
    }

    function check(btn, type, val) {
        // 清除該排選中狀態
        const group = document.getElementById(`${type}-group`);
        group.querySelectorAll('button').forEach(b => b.className = '');
        
        if (val === currentAnswer[type]) {
            btn.className = 'correct';
            userAnswer[type] = val;
        } else {
            btn.className = 'wrong';
        }

        // 如果三項都對了，一秒後自動下一題
        if (userAnswer.e === currentAnswer.e && userAnswer.v === currentAnswer.v && userAnswer.m === currentAnswer.m) {
            totalPracticed++;
            document.getElementById('count').innerText = totalPracticed;
            setTimeout(nextQuestion, 1200);
        }
    }

    // 初始化第一題
    window.onload = nextQuestion;
</script>

</body>
</html>
