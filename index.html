<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GCS 精簡訓練器 - EMT-P 17th</title>
    <style>
        body { font-family: 'PingFang TC', 'Microsoft JhengHei', sans-serif; background: #1a1a1a; color: #e0e0e0; display: flex; justify-content: center; padding: 20px; margin: 0; }
        .card { background: #262626; width: 100%; max-width: 480px; border-radius: 15px; padding: 25px; box-shadow: 0 10px 40px rgba(0,0,0,0.6); border: 1px solid #3d3d3d; text-align: center; }
        .header { margin-bottom: 20px; text-align: left; border-left: 4px solid #e74c3c; padding-left: 15px; }
        .scenario-box { background: #121212; border-radius: 8px; padding: 20px; min-height: 110px; margin-bottom: 15px; display: flex; align-items: center; justify-content: center; border: 1px inset #333; }
        #scenarioText { font-size: 1.15rem; display: none; line-height: 1.7; color: #ffffff; font-weight: 500; }
        #placeholderText { font-size: 1.1rem; color: #555; font-style: italic; }
        
        /* 語音選擇器樣式 */
        .voice-selector { width: 100%; padding: 8px; margin-bottom: 15px; background: #333; color: #fff; border: 1px solid #555; border-radius: 5px; font-size: 0.9rem; }
        
        .btn-action { background: #333; color: #fff; border: 1px solid #444; padding: 12px 18px; border-radius: 6px; cursor: pointer; margin: 5px; font-size: 0.9rem; transition: 0.2s; }
        .label { font-weight: bold; width: 100%; margin: 15px 0 8px 0; color: #e74c3c; text-align: left; font-size: 0.85rem; letter-spacing: 1px; }
        .btn-group { display: flex; justify-content: space-between; gap: 6px; margin-bottom: 12px; }
        button.num-btn { flex: 1; height: 50px; border-radius: 6px; border: none; background: #444; color: #fff; font-size: 1.2rem; font-weight: 600; cursor: pointer; transition: 0.1s; }
        button.correct { background: #27ae60 !important; color: #fff; }
        button.wrong { background: #c0392b !important; color: #fff; }
        .next-btn { background: #c0392b; color: white; width: 100%; height: 55px; border: none; border-radius: 8px; cursor: pointer; font-size: 1.1rem; margin-top: 25px; font-weight: bold; }
        .score-info { font-size: 0.85rem; color: #888; margin-top: 15px; display: flex; justify-content: space-between; }
        #totalScoreDisplay { font-size: 0.8rem; color: #f1c40f; margin-top: 5px; display: none; }
    </style>
</head>
<body>

<div class="card">
    <div class="header">
        <div style="font-size: 1.2rem; font-weight: bold; color: #fff;">GCS 直覺聽力反應測試</div>
        <div style="font-size: 0.8rem; color: #888;">精簡指令版 (4-15分)</div>
    </div>

    <select id="voiceSelect" class="voice-selector">
        <option value="">正在載入系統語音...</option>
    </select>

    <div class="scenario-box">
        <div id="scenarioText">準備中...</div>
        <div id="placeholderText">請點擊下方按鈕開始</div>
    </div>

    <div>
        <button class="btn-action" onclick="speakScenario()">🔊 重聽情境</button>
        <button class="btn-action" id="toggleBtn" onclick="toggleText()">👁️ 顯示文字</button>
    </div>

    <div class="controls">
        <div class="label">EYE OPENING (E)</div>
        <div class="btn-group" id="e-group">
            <button class="num-btn" onclick="check(this, 'e', 1)">1</button>
            <button class="num-btn" onclick="check(this, 'e', 2)">2</button>
            <button class="num-btn" onclick="check(this, 'e', 3)">3</button>
            <button class="num-btn" onclick="check(this, 'e', 4)">4</button>
        </div>

        <div class="label">VERBAL (V)</div>
        <div class="btn-group" id="v-group">
            <button class="num-btn" onclick="check(this, 'v', 1)">1</button>
            <button class="num-btn" onclick="check(this, 'v', 2)">2</button>
            <button class="num-btn" onclick="check(this, 'v', 3)">3</button>
            <button class="num-btn" onclick="check(this, 'v', 4)">4</button>
            <button class="num-btn" onclick="check(this, 'v', 5)">5</button>
        </div>

        <div class="label">MOTOR (M)</div>
        <div class="btn-group" id="m-group">
            <button class="num-btn" onclick="check(this, 'm', 1)">1</button>
            <button class="num-btn" onclick="check(this, 'm', 2)">2</button>
            <button class="num-btn" onclick="check(this, 'm', 3)">3</button>
            <button class="num-btn" onclick="check(this, 'm', 4)">4</button>
            <button class="num-btn" onclick="check(this, 'm', 5)">5</button>
            <button class="num-btn" onclick="check(this, 'm', 6)">6</button>
        </div>
    </div>
    
    <div id="totalScoreDisplay">正確答案：GCS <span id="ansVal"></span> 分</div>
    <button class="next-btn" onclick="nextQuestion()">下一題 (Next Case)</button>
    
    <div class="score-info">
        <span>正確解答次數: <span id="count" style="color: #27ae60;">0</span></span>
        <span>iOS 語音手動選擇版</span>
    </div>
</div>

<script>
    let currentAnswer = { e: 0, v: 0, m: 0 };
    let userAnswer = { e: 0, v: 0, m: 0 };
    let totalPracticed = 0;
    let textVisible = false;
    let voices = [];
    const voiceSelect = document.getElementById('voiceSelect');

    // 抓取並過濾中文語音，放入下拉選單
    function loadVoices() {
        voices = window.speechSynthesis.getVoices();
        voiceSelect.innerHTML = ''; 
        
        const chineseVoices = voices.filter(v => v.lang.includes('zh') || v.name.includes('Chinese'));
        
        if (chineseVoices.length === 0) {
            voiceSelect.innerHTML = '<option value="">請點擊任意處或發聲以喚醒語音引擎</option>';
            return;
        }

        chineseVoices.forEach((voice, index) => {
            const option = document.createElement('option');
            option.value = index; 
            option.textContent = `${voice.name} (${voice.lang})`;
            voiceSelect.appendChild(option);
        });

        // 預設尋找男聲 (嘉猷 Chia-Chi)
        const defaultMaleIndex = chineseVoices.findIndex(v => v.name.includes('Chia-Chi') || v.name.includes('嘉猷'));
        if (defaultMaleIndex !== -1) {
            voiceSelect.selectedIndex = defaultMaleIndex;
        }
    }

    window.speechSynthesis.onvoiceschanged = loadVoices;

    // 50 題精簡題庫 (M5 已全部替換為 "對痛可以定位")
    const scenarios = [
        { text: "自發張眼，對答正確，可配合指令。", e: 4, v: 5, m: 6 },
        { text: "拍肩後張眼，說話正確，可配合指令。", e: 3, v: 5, m: 6 },
        { text: "自發張眼，對話混亂，可配合指令。", e: 4, v: 4, m: 6 },
        { text: "拍肩後張眼，對話混亂，可配合指令。", e: 3, v: 4, m: 6 },
        { text: "自發張眼，對話正確，無法配合指令，對痛可以定位。", e: 4, v: 5, m: 5 },
        { text: "自發張眼，會說單字，可配合指令。", e: 4, v: 3, m: 6 },
        { text: "拍肩後張眼，會聲吟，對痛可以定位。", e: 3, v: 2, m: 5 },
        { text: "痛刺激後張眼，對話混亂，對痛可以定位。", e: 2, v: 4, m: 5 },
        { text: "自發張眼，不發聲，手呈現縮回動作。", e: 4, v: 1, m: 4 },
        { text: "拍肩後張眼，會說單字，手呈現縮回動作。", e: 3, v: 3, m: 4 },
        { text: "痛刺激後張眼，會聲吟，手呈現縮回動作。", e: 2, v: 2, m: 4 },
        { text: "拍肩後張眼，對答正確，手部無反應。", e: 3, v: 5, m: 1 },
        { text: "自發張眼，會聲吟，手呈現病態屈曲。", e: 4, v: 2, m: 3 },
        { text: "痛刺激後張眼，不發聲，對痛可以定位。", e: 2, v: 1, m: 5 },
        { text: "痛刺激後張眼，會說單字，手呈現病態伸展。", e: 2, v: 3, m: 2 },
        { text: "不張眼，會聲吟，手呈現病態屈曲。", e: 1, v: 2, m: 3 },
        { text: "拍肩後張眼，不發聲，手呈現病態伸展。", e: 3, v: 1, m: 2 },
        { text: "痛刺激後張眼，不發聲，手呈現病態屈曲。", e: 2, v: 1, m: 3 },
        { text: "自發張眼，不發聲，手呈現病態伸展。", e: 4, v: 1, m: 2 },
        { text: "不張眼，會說單字，對痛可以定位。", e: 1, v: 3, m: 5 },
        { text: "不張眼，會聲吟，手呈現縮回動作。", e: 1, v: 2, m: 4 },
        { text: "痛刺激後張眼，會聲吟，手部無反應。", e: 2, v: 2, m: 1 },
        { text: "不張眼，會說單字，手呈現病態屈曲。", e: 1, v: 3, m: 3 },
        { text: "拍肩後張眼，會聲吟，手部無反應。", e: 3, v: 2, m: 1 },
        { text: "自發張眼，會說單字，手呈現病態屈曲。", e: 4, v: 3, m: 3 },
        { text: "痛刺激後張眼，會聲吟，手呈現縮回動作。", e: 2, v: 2, m: 4 },
        { text: "不張眼，對話混亂，對痛可以定位。", e: 1, v: 4, m: 5 },
        { text: "拍肩後張眼，會說單字，手呈現病態伸展。", e: 3, v: 3, m: 2 },
        { text: "自發張眼，不發聲，對痛可以定位。", e: 4, v: 1, m: 5 },
        { text: "不張眼，會聲吟，手呈現病態伸展。", e: 1, v: 2, m: 2 },
        { text: "痛刺激後張眼，會說單字，對痛可以定位。", e: 2, v: 3, m: 5 },
        { text: "拍肩後張眼，不發聲，手呈現縮回動作。", e: 3, v: 1, m: 4 },
        { text: "自發張眼，會聲吟，手部無反應。", e: 4, v: 2, m: 1 },
        { text: "不張眼，會說單字，手呈縮回動作。", e: 1, v: 3, m: 4 },
        { text: "痛刺激後張眼，不發聲，手呈病態伸展。", e: 2, v: 1, m: 2 },
        { text: "拍肩後張眼，對話混亂，手呈病態屈曲。", e: 3, v: 4, m: 3 },
        { text: "自發張眼，會說單字，對痛可以定位。", e: 4, v: 3, m: 5 },
        { text: "不張眼，對答正確，手呈縮回動作。", e: 1, v: 5, m: 4 },
        { text: "痛刺激後張眼，會聲吟，對痛可以定位。", e: 2, v: 2, m: 5 },
        { text: "拍肩後張眼，不發聲，對痛可以定位。", e: 3, v: 1, m: 5 },
        { text: "自發張眼，會說單字，手部無反應。", e: 4, v: 3, m: 1 },
        { text: "不張眼，會聲吟，手呈病態屈曲。", e: 1, v: 2, m: 3 },
        { text: "痛刺激後張眼，不發聲，手部無反應。", e: 2, v: 1, m: 1 },
        { text: "拍肩後張眼，對話混亂，手呈病態伸展。", e: 3, v: 4, m: 2 },
        { text: "自發張眼，對答正確，手部呈縮回。", e: 4, v: 5, m: 4 },
        { text: "不張眼，不發聲，對痛可以定位。", e: 1, v: 1, m: 5 },
        { text: "痛刺激後張眼，會說單字，手部呈病態屈曲。", e: 2, v: 3, m: 3 },
        { text: "拍肩後張眼，對話正確，手部呈病態屈曲。", e: 3, v: 5, m: 3 },
        { text: "自發張眼，不發聲，對痛可以定位。", e: 4, v: 1, m: 5 },
        { text: "不張眼，對話正確，對痛可以定位。", e: 1, v: 5, m: 5 }
    ];

    function toggleText() {
        textVisible = !textVisible;
        const textEl = document.getElementById('scenarioText');
        const placeholderEl = document.getElementById('placeholderText');
        if (textVisible) {
            textEl.style.display = 'block';
            placeholderEl.style.display = 'none';
        } else {
            textEl.style.display = 'none';
            placeholderEl.style.display = 'block';
        }
    }

    function nextQuestion() {
        userAnswer = { e: 0, v: 0, m: 0 };
        document.querySelectorAll('.num-btn').forEach(b => b.className = 'num-btn');
        document.getElementById('totalScoreDisplay').style.display = 'none';
        const rand = Math.floor(Math.random() * scenarios.length);
        const q = scenarios[rand];
        currentAnswer = { e: q.e, v: q.v, m: q.m };
        document.getElementById('scenarioText').innerText = q.text;
        document.getElementById('ansVal').innerText = (q.e + q.v + q.m);
        textVisible = true; toggleText(); 
        
        if(voices.length === 0) loadVoices();
        
        speakScenario();
    }

    function speakScenario() {
        window.speechSynthesis.cancel();
        const text = document.getElementById('scenarioText').innerText;
        const msg = new SpeechSynthesisUtterance(text);
        
        const chineseVoices = voices.filter(v => v.lang.includes('zh') || v.name.includes('Chinese'));
        const selectedIndex = voiceSelect.value;
        
        if (selectedIndex !== "" && chineseVoices[selectedIndex]) {
            msg.voice = chineseVoices[selectedIndex];
        }
        
        msg.rate = 1.0;
        window.speechSynthesis.speak(msg);
    }

    function check(btn, type, val) {
        const group = document.getElementById(`${type}-group`);
        group.querySelectorAll('.num-btn').forEach(b => b.className = 'num-btn');
        if (val === currentAnswer[type]) {
            btn.classList.add('correct');
            userAnswer[type] = val;
        } else {
            btn.classList.add('wrong');
        }
        if (userAnswer.e === currentAnswer.e && userAnswer.v === currentAnswer.v && userAnswer.m === currentAnswer.m) {
            totalPracticed++;
            document.getElementById('count').innerText = totalPracticed;
            document.getElementById('totalScoreDisplay').style.display = 'block';
            if (!textVisible) toggleText();
            setTimeout(nextQuestion, 1800);
        }
    }
    
    loadVoices();
    window.onload = nextQuestion;
</script>
</body>
</html>
